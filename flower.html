<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Wish Granted — Blow the Dandelion</title>
<style>
  :root{
    --ivory: #fdf3dd;
    --ivory-glow: rgba(253,243,221,0.9);
    --stem-dark: #1c1420;
    --panel-purple: rgba(72,32,86,0.35);
    --panel-border: rgba(255,255,255,0.28);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden; background:#1a0f2e;
    font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    -webkit-user-select:none; user-select:none;
    touch-action:none;
  }
  #scene{
    position:fixed; inset:0; width:100%; height:100%;
    background: linear-gradient(180deg,
      #170b28 0%,
      #2c1442 14%,
      #4a1f56 30%,
      #7a2f5e 48%,
      #b64f63 66%,
      #d97b5a 82%,
      #e79a5f 100%
    );
    overflow:hidden;
  }
  #hazeTop{
    position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 70% 45% at 50% 8%, rgba(120,70,160,0.35), transparent 70%),
                radial-gradient(ellipse 80% 40% at 50% 100%, rgba(255,170,110,0.18), transparent 70%);
    mix-blend-mode: screen;
  }
  canvas#fx{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  #hint{
    position:absolute; left:0; right:0; bottom:6.5%;
    text-align:center; color:rgba(255,244,224,0.82);
    font-size:14px; letter-spacing:0.32em; text-transform:uppercase;
    font-weight:400; text-shadow:0 0 18px rgba(255,214,170,0.5);
    opacity:0; transition:opacity 1.1s ease;
    pointer-events:none; z-index:5; padding:0 20px;
  }
  #hint.show{ opacity:1; }
  #hint .sub{ display:block; font-size:11px; opacity:0.65; margin-top:6px; letter-spacing:0.28em; }

  #wishTitle{
    position:absolute; top:7%; left:0; right:0; text-align:center;
    color: var(--ivory); z-index:5; pointer-events:none;
    opacity:0; transition:opacity 1.4s ease;
  }
  #wishTitle.show{ opacity:1; }
  #wishTitle .granted{
    font-family: Georgia, 'Times New Roman', serif;
    font-style:italic; font-size:clamp(28px,6vw,46px);
    letter-spacing:0.03em;
    text-shadow: 0 0 30px rgba(255,224,180,0.65), 0 0 70px rgba(255,190,140,0.35);
  }
  #wishTitle .sub{
    margin-top:10px; font-size:13px; letter-spacing:0.18em; text-transform:uppercase;
    color:rgba(255,244,224,0.75); font-style:normal;
  }

  /* Glassmorphism wish panel */
  #panelWrap{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    z-index:10; opacity:1; pointer-events:auto;
    transition: opacity 0.9s ease;
  }
  #panelWrap.show{ opacity:1; pointer-events:auto; }
  #panelBackdrop{
    position:absolute; inset:0; background:rgba(20,8,30,0.28);
    backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
    transition: backdrop-filter 0.9s ease, -webkit-backdrop-filter 0.9s ease;
  }
  #panelWrap.show #panelBackdrop{
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  #panel{
    position:relative; width:min(420px, 88vw); padding:44px 34px 30px;
    border-radius:32px;
    background: linear-gradient(160deg, rgba(120,60,140,0.42), rgba(70,30,90,0.28));
    border:1px solid var(--panel-border);
    box-shadow: 0 30px 80px rgba(20,5,35,0.55), inset 0 1px 0 rgba(255,255,255,0.15);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    text-align:center;
    transform: translateY(0);
    opacity:1;
    transition: transform 0.9s cubic-bezier(.19,1,.22,1), opacity 0.9s ease;
  }
  #panelWrap.show #panel{ transform:translateY(0); opacity:1; }
  #panel h1{
    margin:0; font-weight:400; font-style:italic; color:var(--ivory);
    font-size:clamp(30px,7vw,40px); letter-spacing:0.02em;
    text-shadow:0 0 24px rgba(255,220,180,0.4);
  }
  #panel .tagline{
    margin:10px 0 26px; font-size:11.5px; letter-spacing:0.28em; text-transform:uppercase;
    color:rgba(255,244,224,0.7); font-family: Georgia, serif; font-style:normal;
  }
  #wishInput{
    width:100%; background:transparent; border:none;
    border-bottom:1px solid rgba(255,255,255,0.35);
    color:var(--ivory); font-size:17px; font-style:italic;
    padding:8px 4px 12px; text-align:center; outline:none;
    font-family: Georgia, 'Times New Roman', serif;
  }
  #wishInput::placeholder{ color:rgba(255,244,224,0.45); }
  #beginBtn{
    margin-top:30px; width:100%; padding:15px 20px; border-radius:999px;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.4);
    color:var(--ivory); font-size:13px; letter-spacing:0.3em; text-transform:uppercase;
    cursor:pointer; transition: background 0.3s ease, transform 0.2s ease;
    font-family: Georgia, serif;
  }
  #beginBtn:hover{ background:rgba(255,255,255,0.16); }
  #beginBtn:active{ transform:scale(0.97); }
  #panelFooter{
    margin-top:20px; font-size:10.5px; letter-spacing:0.14em;
    color:rgba(255,244,224,0.5); font-family: Georgia, serif; font-style:italic;
  }

  #muteBtn{
    position:absolute; top:22px; right:22px; z-index:20;
    width:38px; height:38px; border-radius:50%; border:1px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.06); color:rgba(255,244,224,0.85);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size:15px; backdrop-filter:blur(6px);
  }

  @media (max-width:520px){
    #panel{ padding:36px 26px 24px; }
  }
</style>
</head>
<body>

<div id="scene">
  <div id="hazeTop"></div>
  <canvas id="fx"></canvas>

  <div id="wishTitle">
    <div class="granted">✨ Wish Granted ✨</div>
    <div class="sub">The wind has carried your wish beyond the horizon.</div>
  </div>

  <div id="hint">Press &amp; Hold to Blow<span class="sub" id="hintSub"></span></div>

  <button id="muteBtn" title="Toggle sound">♪</button>

  <div id="panelWrap">
    <div id="panelBackdrop"></div>
    <div id="panel">
      <h1>make a wish</h1>
      <div class="tagline">The wind is listening.</div>
      <input id="wishInput" type="text" placeholder="Whisper your wish..." maxlength="140" autocomplete="off">
      <button id="beginBtn">Begin</button>
      <div id="panelFooter">Uses your microphone to feel your breath.</div>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

/* ---------------------------------------------------------------
   CANVAS SETUP
--------------------------------------------------------------- */
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d', { alpha:true });
let DPR = Math.min(window.devicePixelRatio || 1, 2.5);
let W = 0, H = 0;

function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layoutFlower();
}
window.addEventListener('resize', resize);

/* ---------------------------------------------------------------
   UTILITIES
--------------------------------------------------------------- */
function rand(a,b){ return a + Math.random()*(b-a); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function lerp(a,b,t){ return a+(b-a)*t; }

// smooth pseudo-noise via layered sines (fast, continuous, no allocation)
function noise1(t, seed){
  return Math.sin(t*0.7 + seed*11.3)*0.5 +
         Math.sin(t*1.9 + seed*3.7)*0.3 +
         Math.sin(t*4.1 + seed*7.1)*0.2;
}
function noise2(t, seed){
  return Math.sin(t*0.5 + seed*5.9)*0.5 +
         Math.sin(t*2.3 + seed*2.1)*0.35 +
         Math.sin(t*3.4 + seed*9.4)*0.15;
}

/* ---------------------------------------------------------------
   AMBIENT BACKGROUND PARTICLES (dust / bokeh)
--------------------------------------------------------------- */
let dust = [];
function initDust(){
  dust = [];
  const count = Math.round((W*H)/38000);
  for(let i=0;i<count;i++){
    dust.push({
      x: rand(0,W), y: rand(0,H),
      r: rand(0.6,2.6),
      big: Math.random() < 0.12,
      baseAlpha: rand(0.15,0.55),
      phase: rand(0,Math.PI*2),
      speed: rand(0.15,0.5),
      driftX: rand(-0.06,0.06),
      driftY: rand(-0.14,-0.03)
    });
  }
}
function drawDust(t){
  for(const d of dust){
    d.x += d.driftX + Math.sin(t*0.3+d.phase)*0.05;
    d.y += d.driftY;
    if(d.y < -20){ d.y = H+20; d.x = rand(0,W); }
    if(d.x < -20) d.x = W+20;
    if(d.x > W+20) d.x = -20;
    const flicker = 0.6 + 0.4*Math.sin(t*d.speed + d.phase);
    const a = d.baseAlpha * flicker;
    const rr = d.big ? d.r*3.2 : d.r;
    const g = ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,rr*4);
    g.addColorStop(0, `rgba(255,236,205,${a})`);
    g.addColorStop(1, 'rgba(255,236,205,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(d.x,d.y,rr*4,0,Math.PI*2);
    ctx.fill();
  }
}

/* ---------------------------------------------------------------
   DANDELION MODEL
--------------------------------------------------------------- */
let flower = {
  cx:0, cy:0, R:0,          // seed-head centre & radius
  baseX:0, baseY:0,         // stem base
  stemCtrl:{x:0,y:0}
};

const SEED_COUNT = 190;
let seeds = [];           // attached filaments
let flying = [];          // detached seeds in flight
let sparkles = [];        // tiny transient glow particles

function layoutFlower(){
  // seed head occupies ~35-45% of screen height
  const targetPct = clamp(0.40, 0.35, 0.45);
  flower.R = (H * targetPct) / 2;
  flower.cx = W * 0.5;
  flower.cy = H * 0.34;
  flower.baseX = flower.cx + flower.R*0.18;
  flower.baseY = clamp(flower.cy + flower.R*4.3, flower.cy + flower.R*1.4, H*0.98);
  flower.stemCtrl.x = flower.cx + flower.R*0.55;
  flower.stemCtrl.y = flower.cy + (flower.baseY-flower.cy)*0.5;
}

function buildSeeds(){
  seeds = [];
  for(let i=0;i<SEED_COUNT;i++){
    const angle = (i/SEED_COUNT)*Math.PI*2 + rand(-0.06,0.06);
    const ringJ = rand(-1,1);
    seeds.push({
      angle,
      baseR: rand(0.10,0.16),          // fraction of R, start of filament near disc
      tipR: 0.86 + ringJ*0.10 + rand(-0.04,0.04), // fraction of R
      width: rand(0.7,1.5),
      hairs: 2 + (Math.random()<0.4 ? 1:0),
      hairSpread: rand(0.06,0.14),
      alpha: rand(0.72,1),
      wobbleSeed: rand(0,100),
      swaySeed: rand(0,100),
      attached:true,
      stress: 0,
      threshold: rand(0.35,1.15),
      growProgress: 1,          // 0=folded bud, 1=fully bloomed filament
      foldOffset: rand(0.18,0.4) * (Math.random()<0.5?-1:1), // unfurl twist while blooming
      releaseIndex: -1,
      vx:0, vy:0
    });
  }
}

function resetFlower(){
  buildSeeds();
  flying = [];
  sparkles = [];
  pendingReleases = [];
  isBlowing = false;
  blowEnergy = 0;
}

/* ---------------------------------------------------------------
   DRAW: STEM + LEAVES
--------------------------------------------------------------- */
function drawStem(t){
  const sway = Math.sin(t*0.4)*4;
  ctx.save();
  ctx.strokeStyle = 'rgba(20,14,24,0.92)';
  ctx.lineCap = 'round';
  ctx.lineWidth = Math.max(2.2, flower.R*0.045);
  ctx.beginPath();
  ctx.moveTo(flower.cx, flower.cy + flower.R*0.62);
  ctx.quadraticCurveTo(
    flower.stemCtrl.x + sway, flower.stemCtrl.y,
    flower.baseX + sway*1.6, flower.baseY
  );
  ctx.stroke();

  // leaves near base
  ctx.fillStyle = 'rgba(18,12,20,0.9)';
  const lx = flower.baseX + sway*1.6, ly = flower.baseY - flower.R*0.12;
  for(let i=-1;i<=1;i+=2){
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.quadraticCurveTo(lx + i*flower.R*0.5, ly+flower.R*0.05, lx + i*flower.R*0.62, ly+flower.R*0.22);
    ctx.quadraticCurveTo(lx + i*flower.R*0.28, ly+flower.R*0.14, lx, ly+flower.R*0.08);
    ctx.fill();
  }
  ctx.restore();
}

/* ---------------------------------------------------------------
   DRAW: SEED HEAD (attached filaments)
--------------------------------------------------------------- */
function easeOutBack(x){
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3*Math.pow(x-1,3) + c1*Math.pow(x-1,2);
}

function seedTipPosition(s, t, windForce){
  const grow = s.growProgress===undefined ? 1 : s.growProgress;
  const growEase = grow>=1 ? 1 : easeOutBack(clamp(grow,0,1));
  const unfurl = (1-clamp(grow,0,1)) * s.foldOffset;
  const swayAmt = (0.012 + windForce*0.05) * (1 + noise1(t, s.swaySeed)*0.4);
  const a = s.angle + unfurl + Math.sin(t*0.5 + s.swaySeed)*swayAmt + windForce*0.10*Math.sin(t*3+s.wobbleSeed);
  const vib = windForce>0.02 ? Math.sin(t*40+s.wobbleSeed)*windForce*0.01 : 0;
  const effTipR = lerp(s.baseR, s.tipR, clamp(growEase,0,1.15));
  const r = flower.R*(effTipR + vib);
  return {
    x: flower.cx + Math.cos(a)*r,
    y: flower.cy + Math.sin(a)*r,
    angle:a, r
  };
}

function drawFilament(bx,by,tx,ty,angle,alpha,hairs,hairSpread,width){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = 'rgba(255,246,224,0.9)';
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(bx,by);
  ctx.lineTo(tx,ty);
  ctx.stroke();

  // fluffy fork hairs near tip
  const hairLen = Math.hypot(tx-bx,ty-by)*0.16;
  for(let h=0; h<hairs; h++){
    const off = (h - (hairs-1)/2) * hairSpread;
    const ha = angle + off;
    const hx = tx + Math.cos(ha)*hairLen;
    const hy = ty + Math.sin(ha)*hairLen;
    ctx.lineWidth = width*0.6;
    ctx.globalAlpha = alpha*0.7;
    ctx.beginPath();
    ctx.moveTo(tx,ty);
    ctx.lineTo(hx,hy);
    ctx.stroke();
  }
  // tiny glinting star at the tip — bright core + soft glow + 4-point sparkle,
  // like the crisp starburst edges in the reference
  const tipR = width*0.85;
  ctx.globalAlpha = alpha;
  const glow = ctx.createRadialGradient(tx,ty,0,tx,ty,tipR*5);
  glow.addColorStop(0, 'rgba(255,250,235,0.55)');
  glow.addColorStop(1, 'rgba(255,250,235,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(tx,ty,tipR*5,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle = 'rgba(255,252,240,0.95)';
  ctx.lineWidth = Math.max(0.6, width*0.5);
  const spark = tipR*3.2;
  ctx.beginPath();
  ctx.moveTo(tx-spark,ty); ctx.lineTo(tx+spark,ty);
  ctx.moveTo(tx,ty-spark); ctx.lineTo(tx,ty+spark);
  ctx.stroke();

  ctx.fillStyle = 'rgba(255,252,240,0.98)';
  ctx.beginPath();
  ctx.arc(tx,ty,tipR,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawSeedHead(t, windForce, bloomPulse){
  bloomPulse = bloomPulse||0;
  // soft dark vignette behind head for contrast, like reference
  const glowR = flower.R*1.6;
  const vg = ctx.createRadialGradient(flower.cx,flower.cy,flower.R*0.1,flower.cx,flower.cy,glowR);
  vg.addColorStop(0,'rgba(30,10,40,0.35)');
  vg.addColorStop(0.55,'rgba(30,10,40,0.18)');
  vg.addColorStop(1,'rgba(30,10,40,0)');
  ctx.fillStyle = vg;
  ctx.beginPath(); ctx.arc(flower.cx,flower.cy,glowR,0,Math.PI*2); ctx.fill();

  // outer ivory bloom
  const bg = ctx.createRadialGradient(flower.cx,flower.cy,0,flower.cx,flower.cy,flower.R*1.15);
  bg.addColorStop(0,'rgba(255,244,214,0.22)');
  bg.addColorStop(0.7,'rgba(255,244,214,0.07)');
  bg.addColorStop(1,'rgba(255,244,214,0)');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(flower.cx,flower.cy,flower.R*1.15,0,Math.PI*2); ctx.fill();

  // blossoming flash — a soft bright pulse that blooms outward and settles,
  // echoing the moment a flower opens into full light
  if(bloomPulse>0.001){
    const pulseR = flower.R*(0.4 + 1.3*(1-bloomPulse));
    const pg = ctx.createRadialGradient(flower.cx,flower.cy,0,flower.cx,flower.cy,pulseR);
    pg.addColorStop(0, `rgba(255,248,224,${0.5*bloomPulse})`);
    pg.addColorStop(0.5, `rgba(255,236,190,${0.22*bloomPulse})`);
    pg.addColorStop(1, 'rgba(255,236,190,0)');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(flower.cx,flower.cy,pulseR,0,Math.PI*2); ctx.fill();
  }

  // faint equator ring (globe-wireframe feel from reference)
  ctx.save();
  ctx.strokeStyle = 'rgba(255,246,224,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(flower.cx,flower.cy, flower.R*0.78, flower.R*0.78, 0,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();

  // filaments
  for(const s of seeds){
    if(!s.attached) continue;
    const base = {
      x: flower.cx + Math.cos(s.angle)*flower.R*s.baseR,
      y: flower.cy + Math.sin(s.angle)*flower.R*s.baseR
    };
    const tip = seedTipPosition(s, t, windForce);
    drawFilament(base.x, base.y, tip.x, tip.y, tip.angle, s.alpha, s.hairs, s.hairSpread, s.width);
  }

  // center disc
  const discR = flower.R*0.13;
  const dg = ctx.createRadialGradient(flower.cx,flower.cy,0,flower.cx,flower.cy,discR);
  dg.addColorStop(0,'rgba(255,248,228,0.95)');
  dg.addColorStop(0.7,'rgba(240,220,180,0.85)');
  dg.addColorStop(1,'rgba(200,170,130,0.6)');
  ctx.fillStyle = dg;
  ctx.beginPath(); ctx.arc(flower.cx,flower.cy,discR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(35,22,20,0.85)';
  ctx.beginPath(); ctx.arc(flower.cx,flower.cy,discR*0.32,0,Math.PI*2); ctx.fill();
}

/* ---------------------------------------------------------------
   FLYING SEED PHYSICS
--------------------------------------------------------------- */
// One completed blow (attack->release) fires one gust: a batch of seeds,
// biased toward whichever side faces the wind, peels off in a fast staggered
// ripple. Blow energy (roughly strength x duration) sets how big the batch is,
// so a short weak puff clears a handful while a long strong breath clears
// most of the head — realistically it takes about two solid blows in total.
function releaseGust(energy, now){
  const attached = seeds.filter(s=>s.attached);
  if(attached.length===0) return;
  const windAngleNow = currentWindAngle(now);
  // weighted-random pick: windward-facing seeds are more likely to go, but it's
  // never a clean deterministic sweep — plenty of randomness in who lets go
  const scored = attached.map(s=>{
    const align = Math.cos(s.angle-windAngleNow);
    const score = align*0.5 + rand(0,1.1) - s.threshold*0.15;
    return { s, score };
  });
  scored.sort((a,b)=>b.score-a.score);
  const frac = clamp(energy*0.5, 0.12, 0.62);
  let count = Math.round(attached.length*frac);
  count = Math.max(count, Math.min(6, attached.length));
  let batch = scored.slice(0, count).map(o=>o.s);

  // shuffle so the release order itself is random, not angle-ordered
  for(let i=batch.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [batch[i],batch[j]] = [batch[j],batch[i]];
  }
  batch.forEach((s)=>{
    const delay = rand(0, 0.6);   // random pop time within the gust window, not sequential
    pendingReleases.push({ seed:s, time: now+delay });
  });
}

function detachSeed(s, t, windForce, windDirX, windDirY){
  s.attached = false;
  const base = {
    x: flower.cx + Math.cos(s.angle)*flower.R*s.baseR,
    y: flower.cy + Math.sin(s.angle)*flower.R*s.baseR
  };
  const tip = seedTipPosition(s, t, windForce);
  const outward = { x: Math.cos(tip.angle), y: Math.sin(tip.angle) };

  // overall travel heading = mostly the prevailing wind, with only a touch of
  // the seed's own pop direction so the whole head empties toward one side
  // (like a real dandelion in a single gust) instead of scattering everywhere
  const windAngle = Math.atan2(windDirY, windDirX);
  const outAngle = Math.atan2(outward.y, outward.x);
  let heading = outAngle*0.28 + windAngle*0.72;
  heading += rand(-0.22,0.22);

  const launchSpeed = 0.5 + windForce*1.6 + Math.random()*0.35;

  flying.push({
    x: tip.x, y: tip.y,
    heading,                          // current direction of travel (radians)
    baseHeading: heading,
    speed: launchSpeed,
    baseSpeed: launchSpeed,
    // wave-path parameters: the path bends left/right over time like a seed riding air currents
    waveFreq: rand(0.35,0.75),
    waveAmp: rand(0.35,0.9),
    wavePhase: rand(0,Math.PI*2),
    // slower secondary wave for gentle long S-curves across the whole flight
    driftFreq: rand(0.08,0.18),
    driftAmp: rand(0.25,0.6),
    driftPhase: rand(0,Math.PI*2),
    // vertical bob (flutter) layered on top, like fluff catching tiny eddies
    bobFreq: rand(1.6,2.8),
    bobAmp: rand(0.15,0.35),
    bobPhase: rand(0,Math.PI*2),
    liftDecay: rand(0.6,1.0),
    rot: tip.angle,
    spin: rand(-0.8,0.8),
    tumblePhase: rand(0,Math.PI*2),
    tumbleFreq: rand(0.4,0.9),
    len: flower.R*(s.tipR - s.baseR)*rand(0.8,1.05),
    width: s.width,
    hairs: s.hairs, hairSpread: s.hairSpread,
    alpha: s.alpha,
    seed: rand(0,1000),
    life: 0,
    maxLife: rand(16,26),
    settleDelay: rand(3,6)
  });
  if(Math.random()<0.6){
    sparkles.push({x:tip.x,y:tip.y,life:0,maxLife:rand(0.5,1.1),r:rand(1,2.6)});
  }
}

// the prevailing wind holds a steady direction (one side, like a real gust) —
// only a whisper of wander so it doesn't feel mechanically fixed
function currentWindAngle(t){
  const base = Math.atan2(windDirY, windDirX);
  return base + noise1(t*0.045, 777)*0.05;
}

function updateFlying(dt, t, windForce, windDirX, windDirY){
  const targetWindAngle = currentWindAngle(t);
  const step = dt*60*0.5; // normalized per-frame step (~0.5 at 60fps)

  for(let i=flying.length-1;i>=0;i--){
    const p = flying[i];
    p.life += dt;
    const lifeT = p.life;

    // wave path: a fast undulation layered on a slow, long S-curve drift.
    // amplitude ramps in over the first couple seconds so the seed leaves
    // the flower cleanly before it starts to weave.
    const rampIn = clamp(lifeT/2.2, 0, 1);
    const fastWave = Math.sin(lifeT*p.waveFreq + p.wavePhase) * p.waveAmp * 0.55 * rampIn;
    const slowDrift = Math.sin(lifeT*p.driftFreq + p.driftPhase) * p.driftAmp * 0.6;

    // the seed gradually gets carried into the prevailing wind direction
    p.heading += (targetWindAngle - p.heading) * 0.006 * (dt*60);
    const heading = p.heading + fastWave + slowDrift;

    // speed breathes gently (gusts) and settles to a slow drifting float over time
    const gustFactor = 0.72 + 0.28*Math.sin(lifeT*0.22 + p.wavePhase);
    const settle = 1 / (1 + lifeT/ (p.settleDelay*3.2));
    p.speed = p.baseSpeed * gustFactor * (0.55 + 0.45*settle) + windForce*0.5;

    // initial lift fades, gentle gravity grows in very slowly (fluff falls almost weightlessly)
    const lift = 0.5 * Math.exp(-lifeT * 0.16 * p.liftDecay);
    const gravity = Math.min(0.006 + lifeT*0.0009, 0.05);
    const flutter = Math.sin(lifeT*p.bobFreq + p.bobPhase) * p.bobAmp * 0.4;

    const vx = Math.cos(heading) * p.speed;
    const vy = Math.sin(heading) * p.speed - lift + gravity*3 + flutter;

    p.x += vx * step;
    p.y += vy * step;

    // tumbling rotation: follows travel direction with its own light wobble
    p.rot = heading + Math.sin(lifeT*p.tumbleFreq + p.tumblePhase) * 0.5 + p.spin*lifeT*0.05;

    let fade = 1;
    if(p.life > p.maxLife*0.75) fade = 1 - (p.life-p.maxLife*0.75)/(p.maxLife*0.25);
    if(p.x < -80 || p.x > W+80 || p.y < -100 || p.y > H+140 || p.life > p.maxLife || fade<=0){
      flying.splice(i,1);
      continue;
    }
    p.curAlpha = p.alpha * clamp(fade,0,1);
    p.curSpeed = p.speed;
  }
}

function drawFlying(){
  for(const p of flying){
    // subtle motion-stretch in the direction of travel at higher speeds, for a livelier streak
    const stretch = 1 + clamp((p.curSpeed||p.speed)*0.12, 0, 0.45);
    const halfLen = p.len*0.5*stretch;
    const dx = Math.cos(p.rot)*halfLen;
    const dy = Math.sin(p.rot)*halfLen;
    drawFilament(p.x-dx,p.y-dy,p.x+dx,p.y+dy,p.rot, p.curAlpha!==undefined?p.curAlpha:p.alpha, p.hairs, p.hairSpread, p.width);
  }
}

function updateSparkles(dt){
  for(let i=sparkles.length-1;i>=0;i--){
    const sp = sparkles[i];
    sp.life += dt;
    if(sp.life>sp.maxLife){ sparkles.splice(i,1); continue; }
  }
}
function drawSparkles(){
  for(const sp of sparkles){
    const a = 1 - sp.life/sp.maxLife;
    ctx.save();
    ctx.globalAlpha = a*0.8;
    const g = ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,sp.r*5);
    g.addColorStop(0,'rgba(255,250,230,0.9)');
    g.addColorStop(1,'rgba(255,250,230,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(sp.x,sp.y,sp.r*5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

/* ---------------------------------------------------------------
   STATE MACHINE
--------------------------------------------------------------- */
const STATE = { LANDING:'landing', PANEL:'panel', READY:'ready', GRANTED:'granted', REBLOOM:'rebloom' };
let state = STATE.LANDING;
let windForce = 0;          // 0..1 current blow strength
let windTarget = 0;
let windDirX = 0.15, windDirY = -0.35;
let stressAccum = 0;
let isBlowing = false, blowEnergy = 0, pendingReleases = [];
const BLOW_ON = 0.22, BLOW_OFF = 0.12;
let detachedCount = 0;
let grantedAt = 0;
let camZoom = 1, camZoomTarget = 1;
let camOffsetY = 0, camOffsetYTarget = 0;

const hintEl = document.getElementById('hint');
let hintDefaultHTML = hintEl.innerHTML;
let hintFlashTimer = null;
function flashHint(text){
  if(state!==STATE.READY) return;
  if(hintFlashTimer) clearTimeout(hintFlashTimer);
  hintEl.textContent = text;
  hintFlashTimer = setTimeout(()=>{
    hintEl.innerHTML = hintDefaultHTML;
    hintFlashTimer = null;
  }, 1700);
}
const hintSub = document.getElementById('hintSub');
const wishTitleEl = document.getElementById('wishTitle');
const panelWrap = document.getElementById('panelWrap');
const wishInput = document.getElementById('wishInput');
const beginBtn = document.getElementById('beginBtn');

function goPanel(){
  state = STATE.PANEL;
  panelWrap.style.opacity = '1';
  panelWrap.style.pointerEvents = 'auto';
  panelWrap.classList.add('show');
}
function goReady(){
  state = STATE.READY;
  panelWrap.style.opacity = '0';
  panelWrap.style.pointerEvents = 'none';
  camZoomTarget = 1.12;
  camOffsetYTarget = -flower.R*0.15;
  hintEl.classList.add('show');
  requestMic();
}
function goGranted(){
  state = STATE.GRANTED;
  grantedAt = performance.now()/1000;
  wishTitleEl.classList.add('show');
  hintEl.classList.remove('show');
  playChimeBurst();
}
function goRebloom(){
  state = STATE.REBLOOM;
  wishTitleEl.classList.remove('show');
}
function finishRebloom(){
  resetFlower();
  detachedCount = 0;
  stressAccum = 0;
  state = STATE.READY;
  hintEl.classList.add('show');
}

setTimeout(()=>{ if(state===STATE.LANDING) goPanel(); }, 0);

beginBtn.addEventListener('click', ()=>{
  try{ localStorage.setItem('dandelion_wish', wishInput.value || ''); }catch(e){}
  initAudio();
  goReady();
});

/* ---------------------------------------------------------------
   INPUT: PRESS & HOLD (mouse + touch)
--------------------------------------------------------------- */
let holding = false;
function setHold(v){
  holding = v;
  if(v) initAudio();
}
window.addEventListener('pointerdown', (e)=>{
  if(state!==STATE.READY) return;
  if(panelWrap.classList.contains('show')) return;
  setHold(true);
});
window.addEventListener('pointerup', ()=> setHold(false));
window.addEventListener('pointercancel', ()=> setHold(false));
window.addEventListener('blur', ()=> setHold(false));

/* ---------------------------------------------------------------
   AUDIO — synthesized ambient wind + chimes + pad (no external assets)
--------------------------------------------------------------- */
let audioCtx=null, windNoise=null, windGain=null, windFilter=null, padGain=null, muted=false;
function initAudio(){
  if(audioCtx) { if(audioCtx.state==='suspended') audioCtx.resume(); return; }
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();

    // wind bed: filtered noise
    const bufSize = audioCtx.sampleRate*2;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1)*0.6;
    windNoise = audioCtx.createBufferSource();
    windNoise.buffer = buf; windNoise.loop = true;
    windFilter = audioCtx.createBiquadFilter();
    windFilter.type = 'bandpass';
    windFilter.frequency.value = 500;
    windFilter.Q.value = 0.6;
    windGain = audioCtx.createGain();
    windGain.gain.value = 0.0;
    windNoise.connect(windFilter).connect(windGain).connect(audioCtx.destination);
    windNoise.start();

    // soft pad
    padGain = audioCtx.createGain();
    padGain.gain.value = 0.0;
    padGain.connect(audioCtx.destination);
    [220, 330, 440].forEach((f,i)=>{
      const o = audioCtx.createOscillator();
      o.type='sine'; o.frequency.value=f;
      const g = audioCtx.createGain();
      g.gain.value = 0.05/(i+1);
      o.connect(g).connect(padGain);
      o.start();
    });
    padGain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 3);
  }catch(e){ /* audio unavailable */ }
}
function updateAudio(){
  if(!audioCtx || muted) return;
  const g = clamp(windForce*0.5, 0, 0.45);
  windGain.gain.setTargetAtTime(g, audioCtx.currentTime, 0.15);
  windFilter.frequency.setTargetAtTime(400+windForce*900, audioCtx.currentTime, 0.2);
}
let lastChime=0;
function playChime(){
  if(!audioCtx || muted) return;
  const now = performance.now();
  if(now-lastChime < 140) return;
  lastChime = now;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type='sine';
  const notes=[880,987,1046,1318,1568];
  o.frequency.value = notes[Math.floor(Math.random()*notes.length)];
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.06, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.9);
  o.connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t+0.9);
}
function playChimeBurst(){
  if(!audioCtx || muted) return;
  for(let i=0;i<5;i++) setTimeout(playChime, i*90);
}
document.getElementById('muteBtn').addEventListener('click', ()=>{
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '✕' : '♪';
  if(audioCtx && padGain) padGain.gain.setTargetAtTime(muted?0:0.5, audioCtx.currentTime, 0.3);
});

/* ---------------------------------------------------------------
   MICROPHONE BLOW DETECTION
--------------------------------------------------------------- */
let micForce = 0;
let micAvailable = false;
let micCalibStart = null, micCalibSamples = [], micNoiseFloor = null;
let micSustainMs = 0, micLastMs = performance.now();
async function requestMic(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    hintSub.textContent = ''; hintDefaultHTML = 'No microphone?<span class="sub">Press &amp; Hold to Blow</span>'; hintEl.innerHTML = hintDefaultHTML;
    return;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    initAudio();
    const src = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    src.connect(analyser);
    micAvailable = true;
    const freqData = new Uint8Array(analyser.frequencyBinCount);
    const timeData = new Uint8Array(analyser.fftSize);

    function poll(){
      analyser.getByteTimeDomainData(timeData);
      analyser.getByteFrequencyData(freqData);
      // RMS energy
      let sumSq=0;
      for(let i=0;i<timeData.length;i++){ const v=(timeData[i]-128)/128; sumSq += v*v; }
      const rms = Math.sqrt(sumSq/timeData.length);
      // spectral flatness (noise-like breath vs tonal speech)
      let logSum=0, sum=0, n=freqData.length;
      for(let i=0;i<n;i++){ const m = Math.max(freqData[i],1); logSum += Math.log(m); sum += m; }
      const geo = Math.exp(logSum/n);
      const ari = sum/n;
      const flatness = ari>0 ? geo/ari : 0;

      const nowMs = performance.now();
      const dtms = clamp(nowMs-micLastMs, 0, 100); micLastMs = nowMs;

      // brief silent calibration window right after connecting: learn the
      // room's noise floor instead of trusting a fixed number, and ignore
      // any mic pop/click from the permission handshake itself
      if(micCalibStart===null) micCalibStart = nowMs;
      if(nowMs - micCalibStart < 700){
        micCalibSamples.push(rms);
        micForce = 0;
        requestAnimationFrame(poll);
        return;
      }
      if(micNoiseFloor===null){
        const sum2 = micCalibSamples.reduce((a,b)=>a+b,0);
        micNoiseFloor = micCalibSamples.length ? sum2/micCalibSamples.length : 0.02;
      }

      const dynThreshold = Math.max(0.05, micNoiseFloor*2.4 + 0.02);
      const breathy = rms > dynThreshold && flatness > 0.28;
      // require the breathy signal to actually sustain for a beat before it
      // counts as a real blow, so a single pop or cough can't trigger it
      micSustainMs = breathy ? micSustainMs + dtms : Math.max(0, micSustainMs - dtms*1.6);

      let target = 0;
      if(micSustainMs > 110){
        target = clamp((rms-dynThreshold)*7, 0, 1);
      }
      micForce += (target-micForce)*(target>micForce ? 0.35 : 0.2);
      requestAnimationFrame(poll);
    }
    poll();
  }catch(err){
    hintDefaultHTML = 'No microphone?<span class="sub">Press &amp; Hold to Blow</span>';
    hintEl.innerHTML = hintDefaultHTML;
  }
}

/* ---------------------------------------------------------------
   MAIN LOOP
--------------------------------------------------------------- */
let lastT = performance.now()/1000;
function frame(){
  const now = performance.now()/1000;
  let dt = now-lastT; lastT = now;
  dt = clamp(dt,0,0.05);

  ctx.clearRect(0,0,W,H);

  // wind target from hold + mic — attack is snappy so a blow reads instantly,
  // release eases off a little slower so it doesn't feel like a hard switch
  const activeInput = (state===STATE.READY);
  windTarget = activeInput ? clamp(Math.max(holding?1:0, micForce),0,1) : 0;
  windForce += (windTarget-windForce)*(windTarget>windForce?0.22:0.08);

  // camera
  camZoom += (camZoomTarget-camZoom)*0.03;
  camOffsetY += (camOffsetYTarget-camOffsetY)*0.03;

  ctx.save();
  ctx.translate(flower.cx, flower.cy);
  ctx.scale(camZoom, camZoom);
  ctx.translate(-flower.cx, -flower.cy + camOffsetY);

  drawDust(now);
  drawStem(now);

  // realistic blow model: a full blow is an attack -> sustain -> release.
  // seeds don't trickle off continuously — instead each complete blow you take
  // releases one gust of seeds toward the wind side, the way an actual
  // dandelion sheds a batch of fluff per breath (so it takes roughly two
  // solid blows to clear the head).
  if(state===STATE.READY){
    if(!isBlowing && windForce > BLOW_ON){
      isBlowing = true;
      blowEnergy = 0;
    }
    if(isBlowing){
      blowEnergy += windForce*dt;
      if(windForce < BLOW_OFF){
        releaseGust(blowEnergy, now);
        isBlowing = false;
        blowEnergy = 0;
        if(detachedCount/SEED_COUNT < 0.74) flashHint('Blow again ✦');
      }
    }
    // seeds queued by the current/most recent gust peel off in a quick,
    // staggered ripple rather than all at once
    for(let i=pendingReleases.length-1;i>=0;i--){
      const pr = pendingReleases[i];
      if(now >= pr.time){
        if(pr.seed.attached){
          detachSeed(pr.seed, now, Math.max(windForce,0.4), windDirX, windDirY);
          detachedCount++;
        }
        pendingReleases.splice(i,1);
      }
    }
  }

  drawSeedHead(now, windForce, bloomPulse);
  updateFlying(dt, now, windForce, windDirX, windDirY);
  drawFlying();
  updateSparkles(dt);
  drawSparkles();

  ctx.restore();

  updateAudio();

  // wish granted trigger
  if(state===STATE.READY){
    const frac = detachedCount/SEED_COUNT;
    if(frac >= 0.74){
      goGranted();
    }
  }
  if(state===STATE.GRANTED){
    if(now-grantedAt > 4.2){
      goRebloom();
      regrowTimer = 0;
    }
  }
  if(state===STATE.REBLOOM){
    regrowTimer += dt;
    const GROW_WINDOW = 0.30;    // how long each seed takes to unfurl, as a fraction of the sweep
    const TOTAL = 2.8;
    const rgFrac = regrowTimer/TOTAL;
    for(let i=0;i<seeds.length;i++){
      const s = seeds[i];
      const order = i/seeds.length;
      if(!s.attached && order <= rgFrac){
        s.attached = true;
        s.growProgress = 0;
        s.alpha = rand(0.72,1);
        const pos = seedTipPosition(s, now, 0);
        sparkles.push({x:pos.x,y:pos.y,life:0,maxLife:rand(0.4,0.8),r:rand(1,2.2)});
      }
      if(s.attached){
        const local = clamp((rgFrac-order)/GROW_WINDOW, 0, 1);
        s.growProgress = local;
      }
    }
    bloomPulse = clamp(1 - regrowTimer/1.6, 0, 1);
    if(rgFrac >= 1+GROW_WINDOW){
      finishRebloom();
    }
  } else {
    bloomPulse = Math.max(0, bloomPulse - dt*0.6);
  }

  requestAnimationFrame(frame);
}
let regrowTimer=0;
let bloomPulse=0;

/* ---------------------------------------------------------------
   INIT
--------------------------------------------------------------- */
resize();
initDust();
resetFlower();
requestAnimationFrame(frame);

})();
</script>
</body>
