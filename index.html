<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Before You Begin — Make a Wish</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(to bottom, #44174e 0%, #682c5f 40%, #bd515e 80%, #d8766c 100%);
      font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fcecfc;
    }

    .card {
      position: relative;
      z-index: 2;
      text-align: center;
      width: 85%;
      max-width: 460px;
      padding: 50px 40px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25),
                  inset 0 1px 2px rgba(255, 255, 255, 0.2);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 22px;
      opacity: 0.85;
    }

    h1 {
      font-family: 'Cinzel', 'Georgia', serif;
      font-size: 1.9rem;
      margin: 0 0 4px 0;
      letter-spacing: 2px;
      font-weight: 400;
      color: #ffffff;
    }
    h2{
            
      font-family: 'Cinzel', 'Georgia', serif;
      font-size: 1.9rem;
      margin: 0 0 4px 0;
      letter-spacing: 2px;
      font-weight: 400;
      color: #ffffff;
    }
    

    .subtitle {
      font-size: 0.72rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.65;
      margin-bottom: 30px;
      color: #ffffff;
      font-weight: 500;
    }

    .message {
      font-size: 1rem;
      line-height: 1.75;
      color: rgba(255, 255, 255, 0.88);
      margin-bottom: 38px;
    }

    .message strong {
      color: #ffffff;
      font-weight: 600;
    }

    .button {
      display: block;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #ffffff;
      padding: 16px 0;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 50px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      font-family: inherit;
      text-decoration: none;
      box-sizing: border-box;
    }

    .button:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .button:active {
      transform: scale(0.98);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="card" id="card">
    <svg class="icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="23" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <path d="M24 15 Q19 24 24 33 Q29 24 24 15 Z" fill="rgba(255,255,255,0.85)"/>
    </svg>
    <h1>Important</h1>
    <h2>Before you begin</h2>
    <div class="subtitle">The wind needs quiet</div>

    <div class="message">
      Be in a <strong>silent place</strong> and turn off your fan,
      so that your wish will not be wasted.
    </div>

    <a href="./index.html" class="button" id="readyBtn">If you are ready, click here</a>
  </div>

</body>
</html>
