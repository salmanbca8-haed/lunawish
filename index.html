<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make a Wish</title>
  <style>
    /* Global Reset & Matching Dusk Gradient Background */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(to bottom, #44174e 0%, #682c5f 40%, #bd515e 80%, #d8766c 100%);
      font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fcecfc;
    }
    
    /* Interactive Background Canvas */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Elegant Glassmorphism Card Container */
    .form-container {
      position: relative;
      z-index: 2;
      text-align: center;
      transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
      width: 85%;
      max-width: 460px;
      padding: 50px 40px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25),
                  inset 0 1px 2px rgba(255, 255, 255, 0.2);
    }

    /* Vertical stem line extending downward from the card */
    .form-container::after {
      content: '';
      position: absolute;
      bottom: -100vh;
      left: 50%;
      width: 1.5px;
      height: 100vh;
      background: rgba(255, 255, 255, 0.2);
      z-index: 1;
      pointer-events: none;
    }

    /* Typography matching image layout */
    h1 {
      font-family: 'Cinzel', 'Georgia', serif;
      font-size: 2.3rem;
      margin: 0 0 4px 0;
      letter-spacing: 2px;
      font-weight: 400;
      color: #ffffff;
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 40px;
      color: #ffffff;
      font-weight: 500;
    }

    /* Minimalist Elegant Input Fields */
    .input-group {
      margin-bottom: 25px;
      text-align: left;
    }

    input[type="text"] {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      color: #ffffff;
      padding: 10px 4px;
      font-size: 1.05rem;
      outline: none;
      box-sizing: border-box;
      transition: border-bottom-color 0.3s ease;
    }

    input[type="text"]:focus {
      border-bottom-color: rgba(255, 255, 255, 0.8);
    }

    /* Flat Pill Button Block layout matching screenshot */
    .button-wrapper {
      text-decoration: none;
      display: block;
      margin-top: 35px;
    }

    .button {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #ffffff;
      padding: 16px 0;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 50px;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .button:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .button:active {
      transform: scale(0.99);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="form-container" id="formPage">
    <h1>make a wish</h1>
    <div class="subtitle">The wind is listening</div>
    
    <div class="input-group">
      <input type="text" id="nameInput" autocomplete="off" placeholder="Name">
    </div>
    
    <div class="input-group">
      <input type="text" id="wishInput" autocomplete="off" placeholder="Your Wish">
    </div>

    <a href="./flower.html" class="button-wrapper">
      <button id="beginButton" class="button">Begin</button>
    </a>
  </div>

  <!-- Firebase SDK Setup -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDHmQqiNm5qmsk5KGpupZj_O4Ck8sgEUh0",
  authDomain: "lunawish-ee318.firebaseapp.com",
  projectId: "lunawish-ee318",
  storageBucket: "lunawish-ee318.firebasestorage.app",
  messagingSenderId: "218292977596",
  appId: "1:218292977596:web:3ba5e4518221f92ef675b9",
  measurementId: "G-S7WV9MVB6D"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

    // Canvas Setup
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    // Drift Particle Effect
    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.2) * 2.5 + 2; 
        this.vy = (Math.random() - 0.5) * 1.5 - 0.8; 
        this.alpha = 1;
        this.size = Math.random() * 2 + 1;
        this.fade = Math.random() * 0.003 + 0.003;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.fade;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    let particles = [];
    let isBlowing = false;

    function triggerBlowEffect() {
      isBlowing = true;
      for (let i = 0; i < 160; i++) {
        particles.push(new Particle(width * 0.3 + (Math.random() - 0.5) * 40, height * 0.5 + (Math.random() - 0.5) * 40));
      }
      animate();
    }

    function animate() {
      if (!isBlowing) return;
      ctx.clearRect(0, 0, width, height);

      if (particles.length < 300 && Math.random() > 0.3) {
        particles.push(new Particle(width * 0.3 + (Math.random() - 0.5) * 60, height * 0.5 + (Math.random() - 0.5) * 60));
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(animate);
    }

    // Process & Save data inputs
    async function saveWish(nameText, wishText) {
      if (!wishText.trim()) {
        alert("Please enter your details before beginning.");
        return false;
      }
      try {
        await push(ref(database, 'wishes'), {
          name: nameText,
          wish: wishText,
          timestamp: Date.now()
        });
        
        localStorage.setItem('userName', nameText);
        localStorage.setItem('userWish', wishText);
        return true;
      } catch (error) {
        console.error(error);
        alert("Action failed. Please check network connections or database security rules.");
        return false;
      }
    }

    const beginButton = document.getElementById('beginButton');
    const formPage = document.getElementById('formPage');
    const nameInput = document.getElementById('nameInput');
    const wishInput = document.getElementById('wishInput');

    beginButton.addEventListener('click', async (event) => {
      event.preventDefault();
      
      const success = await saveWish(nameInput.value, wishInput.value);
      if (success) {
        formPage.style.opacity = '0';
        formPage.style.transform = 'translateY(-10px)';
        
        setTimeout(() => {
          formPage.style.display = 'none';
          triggerBlowEffect();
          
          setTimeout(() => {
            window.location.href = "./flower.html";
          }, 2300);
        }, 800);
      }
    });
  </script>
</body>
</html>
